# GitHub Actions workflow for building and releasing the Wildlife Tool

name: Build and Release Wildlife Tool

# This workflow runs whenever you push code to the 'main' branch
on:
  push:
    tags: 
      - 'v.0.7.1'

# Add this section to grant the necessary permissions for creating a release
permissions:
  contents: write

jobs:
  build:
    # Use a matrix strategy to run jobs on both Windows and macOS
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: Check out your repository code so the workflow can access it
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Specify a stable Python version

      # Step 3: Install all required libraries from your requirements.txt file
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run PyInstaller to build the application
      - name: Build with PyInstaller
        run: pyinstaller WildlifeDistance.spec --noconfirm

      # Step 5: Package the final application into a zip file
      - name: Package application
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            zip -r WildlifeDistance-macOS.zip dist/WildlifeDistance.app
          elif [ "${{ runner.os }}" == "Windows" ]; then
            7z a WildlifeDistance-Windows.zip ./dist/WildlifeDistance.exe
          fi
        shell: bash

      # Step 6: Upload the packaged zip file as an artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildlife-tool-${{ matrix.os }}
          path: WildlifeDistance-*.zip

  release:
    # This job depends on the 'build' job finishing successfully for both OSs
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download all the artifacts (the zip files) from the build jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Step 2: Use a special action to create a new GitHub Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated release of the Wildlife Distance Tool.
            Download the appropriate version for your operating system below.
          draft: false
          prerelease: false

      # Step 3: Upload the macOS and Windows zip files to the new release
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/wildlife-tool-macos-latest/WildlifeDistance-macOS.zip
          asset_name: WildlifeDistance-macOS.zip
          asset_content_type: application/zip
      - name: Upload Windows Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/wildlife-tool-windows-latest/WildlifeDistance-Windows.zip
          asset_name: WildlifeDistance-Windows.zip
          asset_content_type: application/zip

