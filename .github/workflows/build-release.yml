# This workflow builds your application for macOS and Windows whenever you push a new version tag.

name: Build and Release Wildlife Tool

on:
  push:
    tags:
      - 'v0.1' # Triggers the workflow on version tags like v1.0, v1.1, etc.

permissions:
  contents: write

jobs:
  # --- JOB 1: Build the macOS Application ---
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS Application
        run: pyinstaller WildlifeDistance.spec

      - name: Zip the macOS App
        run: zip -r WildlifeDistance-macOS.zip dist/WildlifeDistance.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: WildlifeDistance-macOS.zip

  # --- JOB 2: Build the Windows Application ---
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build Windows Application
        run: pyinstaller WildlifeDistance.spec

      # New Debugging Step: List the contents of the dist folder to see what was created.
      - name: List build artifacts for debugging
        run: ls -R dist

      # Corrected Zipping Step: This now correctly zips the entire application folder.
      - name: Zip the Windows App
        run: Compress-Archive -Path dist/WildlifeDistance -DestinationPath WildlifeDistance-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: WildlifeDistance-Windows.zip

  # --- JOB 3: Create the GitHub Release ---
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            WildlifeDistance-macOS.zip
            WildlifeDistance-Windows.zip
