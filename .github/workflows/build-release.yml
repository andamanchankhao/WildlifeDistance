# GitHub Actions workflow for building and releasing the Wildlife Tool
# Revised for best practices and efficiency

name: Build and Release Wildlife Tool

# This workflow now runs only when you push a new tag that looks like a version number (e.g., v1.0, v1.2.3)
on:
  push:
    tags:
      - 'v0.7.2'

# Grant the necessary permissions for creating a release and uploading assets
permissions:
  contents: write

jobs:
  build:
    # Use a matrix strategy to run jobs on both Windows and macOS
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: Check out your repository code so the workflow can access it
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Specify a stable Python version

      # Step 3: Add caching for dependencies to speed up subsequent builds
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install all required libraries from your requirements.txt file
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run PyInstaller to build the application
      - name: Build with PyInstaller
        run: pyinstaller WildlifeDistance.spec --noconfirm

      # Step 6: Package the final application into a zip file
      - name: Package application
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            zip -r WildlifeDistance-macOS.zip dist/WildlifeDistance.app
          elif [ "${{ runner.os }}" == "Windows" ]; then
            7z a WildlifeDistance-Windows.zip ./dist/WildlifeDistance.exe
          fi
        shell: bash

      # Step 7: Upload the packaged zip file as an artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildlife-distance-${{ matrix.os }}
          path: WildlifeDistance-*.zip

  release:
    # This job depends on the 'build' job finishing successfully for both OSs
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download all the artifacts (the zip files) from the build jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Step 2: Create a new GitHub Release using the tag that triggered the workflow
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use the git tag that triggered the workflow for the release tag and name
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Automated release of the Wildlife Distance Tool.
            Download the appropriate version for your operating system below.
          draft: false
          prerelease: false

      # Step 3: Upload all packaged assets (*.zip) from the artifacts directory to the new release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          # This action will find and upload all .zip files from the artifacts subdirectories
          files: artifacts/*/*.zip

