# This file defines the automated build process for your Wildlife Tool.
# It will run every time you push code to the 'main' branch of your repository.

name: Build and Release Wildlife Tool

on:
  push:
    branches: [ "main" ] # Triggers the workflow on pushes to the main branch

jobs:
  # --- JOB 1: Build the macOS Application ---
  build-macos:
    runs-on: macos-latest # Use the latest available macOS virtual machine

    steps:
      # Step 1.1: Download your repository's code onto the virtual machine
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 1.2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Specify the Python version you use

      # Step 1.3: Install all required libraries from your requirements file
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1.4: Run PyInstaller to build the .app file
      - name: Build macOS Application
        run: pyinstaller WildlifeDistance.spec

      # Step 1.5: Compress the final .app file into a .zip
      - name: Zip the macOS App
        run: zip -r WildlifeDistance-macOS.zip dist/WildlifeDistance.app

      # Step 1.6: Upload the zip file as an "artifact" to be used in the final release job
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: WildlifeDistance-macOS.zip

  # --- JOB 2: Build the Windows Application (runs in parallel with macOS job) ---
  build-windows:
    runs-on: windows-latest # Use the latest available Windows virtual machine

    steps:
      # Steps are identical to macOS job, just on a different OS
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 2.4: Run PyInstaller to build the .exe file
      - name: Build Windows Application
        run: pyinstaller WildlifeDistance.spec
      
      # Step 2.5: Compress the final .exe file into a .zip
      - name: Zip the Windows App
        run: Compress-Archive -Path dist/WildlifeDistance.exe -DestinationPath WildlifeDistance-Windows.zip

      # Step 2.6: Upload the zip file as an "artifact"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: WildlifeDistance-Windows.zip

  # --- JOB 3: Create the GitHub Release ---
  create-release:
    # This job will only run after both the macOS and Windows build jobs have completed successfully
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest # A lightweight Linux machine is fine for just creating the release

    steps:
      # Step 3.1: Download the macOS build artifact from the previous job
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      # Step 3.2: Download the Windows build artifact from the previous job
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
      
      # Step 3.3: Create a new release and upload the downloaded artifacts as assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # This creates a release name based on the date and time, e.g., "Release 2025-09-16-16-56"
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: "Automated release of Wildlife Distance Tool."
          files: |
            WildlifeTool-macOS.zip
            WildlifeTool-Windows.zip
